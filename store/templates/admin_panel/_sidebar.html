{% load static %}
<aside class="admin-sidebar">
  <div class="admin-sidebar-brand">
    <a href="{% url 'admin_dashboard' %}">The Yellow <span>Diaries</span></a>
    <small>Admin Panel</small>
  </div>
  <nav class="admin-sidebar-nav">
    <a href="{% url 'admin_dashboard' %}" class="{% if active == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i>Dashboard
    </a>
    <a href="{% url 'admin_categories' %}" class="{% if active == 'categories' %}active{% endif %}">
      <i class="bi bi-tags"></i>Categories
    </a>
    <a href="{% url 'admin_products' %}" class="{% if active == 'products' %}active{% endif %}">
      <i class="bi bi-box-seam"></i>Products
    </a>
    <a href="{% url 'admin_orders' %}" class="{% if active == 'orders' %}active{% endif %}">
      <i class="bi bi-bag-check"></i>Orders
    </a>
    <hr>
    <a href="{% url 'admin_riders' %}" class="{% if active == 'riders' %}active{% endif %}">
      <i class="bi bi-bicycle"></i>Riders
    </a>
    <a href="{% url 'admin_users' %}" class="{% if active == 'users' %}active{% endif %}">
      <i class="bi bi-people"></i>Customers
    </a>
    <hr>
    <a href="{% url 'admin_reports' %}" class="{% if active == 'reports' %}active{% endif %}">
      <i class="bi bi-graph-up"></i>Reports
    </a>
    <a href="{% url 'admin_gcash_settings' %}" class="{% if active == 'gcash' %}active{% endif %}">
      <i class="bi bi-phone"></i>GCash Settings
    </a>
    <hr>
    <a href="{% url 'home' %}">
      <i class="bi bi-shop"></i>View Store
    </a>
  </nav>
  <form method="post" action="{% url 'logout' %}" class="p-2">
    {% csrf_token %}
    <button type="submit" class="admin-sidebar-logout">
      <i class="bi bi-box-arrow-right me-2"></i>Logout
    </button>
  </form>
</aside>
